name: Build And Deploy

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install frontend deps
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Install backend deps
        run: npm ci
        working-directory: ./server

      - name: Build backend
        run: npm run build
        working-directory: ./server

  docker:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - name: Prepare backend env for compose validation
        run: cp server/.env.example server/.env
      - name: Docker compose config check
        run: docker compose config
