services:
  mongo:
    image: mongo:7
    container_name: eventsphere-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  backend:
    build:
      context: ./server
    container_name: eventsphere-backend
    restart: unless-stopped
    env_file:
      - path: ./server/.env
        required: false
      - path: ./server/.env.example
        required: false
    environment:
      - NODE_ENV=production
      - MONGODB_URI=mongodb://mongo:27017/event_sphere
    depends_on:
      - mongo
    ports:
      - "5000:5000"

  frontend:
    build:
      context: .
    container_name: eventsphere-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "5173:5173"

volumes:
  mongo_data:
